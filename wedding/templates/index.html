<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#c9a84c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Zuka & Mike ✦ Wedding</title>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
</head>
<body class="home-page">
  <div class="grain-overlay"></div>
  <div class="petal-layer" aria-hidden="true">
    <div class="petal p1">✦</div>
    <div class="petal p2">✦</div>
    <div class="petal p3">◇</div>
    <div class="petal p4">✦</div>
    <div class="petal p5">◇</div>
    <div class="petal p6">✦</div>
  </div>

  <main class="home-main">
    <header class="hero">
      <div class="ornament top-ornament">— ✦ —</div>
      <p class="hero-eyebrow">We're getting married!</p>
      <h1 class="hero-title">
        <span class="name bride">Zuka</span>
        <span class="ampersand">&amp;</span>
        <span class="name groom">Mike</span>
      </h1>
      <div class="ornament bottom-ornament">— ✦ —</div>
      <p class="hero-subtitle">Share your memories with us</p>
    </header>

    <section class="action-grid">
      <a href="/camera" class="action-card camera-card">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M16 14l4-6h8l4 6h6a2 2 0 012 2v20a2 2 0 01-2 2H10a2 2 0 01-2-2V16a2 2 0 012-2h6z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="24" cy="26" r="6" stroke="currentColor" stroke-width="2"/>
            <circle cx="24" cy="26" r="2.5" fill="currentColor"/>
          </svg>
        </div>
        <span class="card-label">Camera</span>
        <span class="card-hint">Take a photo or video</span>
      </a>

      <a href="/upload" class="action-card upload-card">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M24 32V16M24 16l-6 6M24 16l6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 34a8 8 0 01-1.6-15.84A12 12 0 1134 24h2a6 6 0 010 12H12z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="card-label">Upload</span>
        <span class="card-hint">Share from your camera roll</span>
      </a>

      <a href="/gallery" class="action-card gallery-card">
        <div class="card-icon">
          <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <rect x="26" y="6" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <rect x="6" y="26" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <rect x="26" y="26" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
          </svg>
        </div>
        <span class="card-label">View Memories</span>
        <span class="card-hint">Browse the wedding gallery</span>
      </a>
    </section>

    <footer class="home-footer">
      <p>With love &amp; gratitude ✦</p>
    </footer>
  </main>

  <script src="/static/js/main.js"></script>
</body>
</html>
