<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#c9a84c"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>{% block title %}Zuka & Mike{% endblock %} ✦ Wedding</title>
  <meta name="gallery-code" content="1298"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/css/main.css"/>
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="grain-overlay"></div>

  {% block nav %}
  <nav class="top-nav">
    <a href="/" class="nav-logo">Z & M</a>
    <a href="/" class="nav-back">← Back</a>
  </nav>
  {% endblock %}

  <main>
    {% block content %}{% endblock %}
  </main>

  <script src="/static/js/main.js"></script>
  {% block extra_scripts %}{% endblock %}
</body>
</html>
